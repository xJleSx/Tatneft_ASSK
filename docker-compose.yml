version: "3.9"

services:
  api:
    build: ./backend
    container_name: askk-api
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      cv:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  cv:
    build: ./cv-service
    container_name: askk-cv
    env_file: ./cv-service/.env
    ports:
      - "8001:8000"
    volumes:
      # Кэш весов YOLO (один раз скачали — у всех рестартов)
      - cv_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s   # первый запуск: скачивание yolov8n.pt + warmup
    # CV_ENABLED на стороне api: см. CV_SERVICE_URL=http://cv:8000

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: askk-postgres
    environment:
      POSTGRES_DB: askk
      POSTGRES_USER: askk
      POSTGRES_PASSWORD: askk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askk -d askk"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: askk-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-bucket-init:
    image: minio/mc:latest
    container_name: askk-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/askk-photos || true;
      mc anonymous set download local/askk-photos || true;
      exit 0;
      "

  redis:
    image: redis:7-alpine
    container_name: askk-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  minio_data:
  cv_models:
